name: emathtoco

services:
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.vps}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 256m
    logging: &logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - public
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: emathtoco-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.vps}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    logging: *logging
    networks:
      - internal
      - egress

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: emathtoco-worker:${IMAGE_TAG:-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 90s
    env_file: ${ENV_FILE:-.env.vps}
    environment:
      TF_NUM_INTRAOP_THREADS: "6"
      TF_NUM_INTEROP_THREADS: "2"
      OMP_NUM_THREADS: "6"
    volumes:
      - ${MODEL_VOLUME_PATH:-./Models}:/models:ro
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 6g
    cpus: 6.0
    logging: *logging
    networks:
      - internal
      - egress

  redis:
    image: redis:8.2.1-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
      - --protected-mode
      - "no"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 384m
    logging: *logging
    networks:
      - internal

networks:
  public:
  egress:
  internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  redis_data:
